stages:
  - build
  - deploy

variables:
  GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle"

build:
  stage: build
  image: gradle:9.4.1-jdk26
  script:
    - gradle clean build
  artifacts:
      paths:
        - build/libs/
      expire_in: 1 week

deploy:
  stage: deploy
  image: openjdk:26-ea
  before_script:
    - apt-get update && apt-get install -y openssh-client
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan $DEPLOY_HOST >> ~/.ssh/known_hosts
  script:
    - scp build/libs/*.jar $DEPLOY_USER@$DEPLOY_HOST:/opt/inventory_system/
    - ssh $DEPLOY_USER@$DEPLOY_HOST "pkill -f 'java -jar /opt/inventory_system/*.jar' || true"
    - ssh $DEPLOY_USER@$DEPLOY_HOST "nohup java -jar /opt/inventory_system/*.jar > /opt/inventory_system/app.log 2>&1 &"
  only:
    - main
