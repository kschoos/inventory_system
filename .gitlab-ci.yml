stages:
  - build
  - deploy

variables:
  GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle"

build_frontend:
  stage: build
  image: node:20
  script:
    - cd frontend
    - npm ci
    - npm run build
  artifacts:
    paths:
      - frontend/dist

build_backend:
  stage: build
  image: gradle:9.4.1-jdk21
  needs:
    - job: build_frontend
      artifacts: true
  script:
    - mkdir -p src/main/resources/static
    - rm -rf src/main/resources/static/*
    - ls frontend
    - cp -r frontend/dist/* src/main/resources/static/
    - gradle clean build
  artifacts:
      paths:
        - build/libs/
      expire_in: 1 week

deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan $DEPLOY_HOST >> ~/.ssh/known_hosts
  script:
    - mv build/libs/*-SNAPSHOT.jar build/libs/InventorySystem.jar
    - scp build/libs/InventorySystem.jar $DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH
    - ssh $DEPLOY_USER@$DEPLOY_HOST "pkill -f 'InventorySystem.jar' || true"
    - ssh $DEPLOY_USER@$DEPLOY_HOST "nohup java -jar '$DEPLOY_PATH/InventorySystem.jar' > '$DEPLOY_PATH/app.log' 2>&1 & disown"
  only:
    - main
