stages:
  - build
  - deploy

variables:
  GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle"

build:
  stage: build
  image: gradle:9.4.1-jdk26
  script:
    - gradle clean build
  artifacts:
      paths:
        - build/libs/
      expire_in: 1 week


  deploy:
    stage: deploy
    image: openjdk:26
    script:
      - mkdir -p /opt/inventory_system
      - cp build/libs/*.jar /opt/inventory_system
      - pkill -f 'java -jar /opt/inventory_system/*.jar' || true
      - nohup java -jar /opt/inventory_system/*.jar > /opt/inventory_system/app.log 2>&1 &
    only:
      - main
