stages:
  - build
  - deploy

variables:
  GRADLE_USER_HOME: "$CI_PROJECT_DIR/.gradle"

build:
  stage: build
  image: gradle:9.4.1-jdk21
  script:
    - gradle clean build
  artifacts:
      paths:
        - build/libs/
      expire_in: 1 week

deploy:
  stage: deploy
  image: alpine:latest
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh
    - echo "$SSH_PRIVATE_KEY" | tr -d '\r' > ~/.ssh/id_rsa
    - chmod 600 ~/.ssh/id_rsa
    - ssh-keyscan $DEPLOY_HOST >> ~/.ssh/known_hosts
  script:
    - scp build/libs/*.jar $DEPLOY_USER@$DEPLOY_HOST:$DEPLOY_PATH
    - ssh $DEPLOY_USER@$DEPLOY_HOST "pkill -f 'java -jar $DEPLOY_PATH*.jar' || true"
    - ssh $DEPLOY_USER@$DEPLOY_HOST "nohup java -jar '$DEPLOY_PATH/InventorySystemApplication.jar' > '$DEPLOY_PATH/app.log' 2>&1 & disown"
  only:
    - main
